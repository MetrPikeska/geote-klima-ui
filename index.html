<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>GeoKlima — Klimatická analýza ČR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
        crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
        integrity="sha384-NZLkVuBRMEeB4VeZz27WwTRvlhec30biQ8Xx7zG7JJnkvEKRg5qi6BNbEXo9ydwv"
        crossorigin="anonymous"/>
  <link rel="stylesheet" href="./css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"
          integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"
          integrity="sha384-JP5UPxIO2Tm2o79Fb0tGYMa44jkWar53aBoCbd8ah0+LcCDoohTIYr+zIXyfGIJN"
          crossorigin="anonymous"></script>
</head>
<body>
<div id="app">

  <!-- Full-screen map -->
  <div id="map"></div>

  <!-- ── MAP TYPE SWITCHER ─────────────────────────────── -->
  <div id="mapSwitcher">
    <button class="map-btn active" data-layer="dark" data-i18n="map.dark">Mapa</button>
    <button class="map-btn" data-layer="osm" data-i18n="map.osm">OSM</button>
    <button class="map-btn" data-layer="ortofoto" data-i18n="map.aerial">Letecká</button>
    <button class="map-btn" data-layer="katastr" data-i18n="map.cadastre">Katastr</button>
  </div>

  <!-- ── LEFT SIDEBAR ──────────────────────────────────── -->
  <aside id="sidebar" aria-label="Ovládací panel">
    <div id="sidebarInner">

      <!-- Header -->
      <div class="sidebar-head">
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="brand-text">
            <span class="brand-name">GeoKlima</span>
            <span class="brand-sub" data-i18n="brand.sub">Klimatická analýza ČR</span>
          </div>
        </div>
        <div class="head-actions">
          <button id="langToggleBtn" class="head-icon-btn lang-btn" title="Switch language / Přepnout jazyk" aria-label="Přepnout jazyk / Switch language">EN</button>
          <a href="https://github.com/MetrPikeska/geote-klima-ui" target="_blank" rel="noopener"
             class="head-icon-btn" title="GitHub">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
            </svg>
          </a>
          <div class="conn-badge" id="connBadge" data-i18n-title="conn.title" title="Stav spojení" role="status" aria-label="Stav spojení">
            <span class="conn-dot" aria-hidden="true"></span>
          </div>
          <button id="sidebarClose" class="head-icon-btn sidebar-close-btn" data-i18n-title="sidebar.close" title="Zavřít panel" aria-label="Zavřít panel">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <path d="M2 2l10 10M12 2L2 12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Scrollable body -->
      <div class="sidebar-body">

        <!-- ── Územní jednotka ──────────────────────── -->
        <div class="s-section">
          <div class="s-label" data-i18n="section.unit">Územní jednotka</div>
          <div class="utype-grid" id="unitTypeGrid">

            <button class="utype-btn" data-type="kraje">
              <svg class="utype-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
                <polygon points="10,2 18,6.5 18,13.5 10,18 2,13.5 2,6.5"/>
              </svg>
              <span class="utype-name" data-i18n="utype.kraje">Kraj</span>
              <span class="utype-count">14</span>
            </button>

            <button class="utype-btn" data-type="okresy">
              <svg class="utype-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
                <rect x="3" y="3" width="14" height="14" rx="2"/>
                <line x1="10" y1="3" x2="10" y2="17"/>
                <line x1="3" y1="10" x2="17" y2="10"/>
              </svg>
              <span class="utype-name" data-i18n="utype.okresy">Okres</span>
              <span class="utype-count">77</span>
            </button>

            <button class="utype-btn active" data-type="orp">
              <svg class="utype-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
                <rect x="2" y="2" width="7" height="7" rx="1.5"/>
                <rect x="11" y="2" width="7" height="7" rx="1.5"/>
                <rect x="2" y="11" width="7" height="7" rx="1.5"/>
                <rect x="11" y="11" width="7" height="7" rx="1.5"/>
              </svg>
              <span class="utype-name" data-i18n="utype.orp">ORP</span>
              <span class="utype-count">206</span>
            </button>

            <button class="utype-btn" data-type="obce">
              <svg class="utype-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M3 9.5L10 3l7 6.5V17H3z"/>
                <rect x="8" y="13" width="4" height="4"/>
              </svg>
              <span class="utype-name" data-i18n="utype.obce">Obec</span>
              <span class="utype-count">6258</span>
            </button>

            <button class="utype-btn" data-type="chko">
              <svg class="utype-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M10 17C10 17 3 13 3 8c0-3.866 3.134-7 7-7s7 3.134 7 7c0 5-7 9-7 9z"/>
                <path d="M10 17V8"/>
                <path d="M10 11l3-3"/>
                <path d="M10 14l-3-3"/>
              </svg>
              <span class="utype-name" data-i18n="utype.chko">CHKO/NP</span>
              <span class="utype-count">33</span>
            </button>

            <button class="utype-btn" data-type="custom">
              <svg class="utype-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M13.5 3.5l3 3L7 16H4v-3L13.5 3.5z"/>
                <path d="M11.5 5.5l3 3"/>
              </svg>
              <span class="utype-name" data-i18n="utype.custom">Vlastní</span>
              <span class="utype-count">—</span>
            </button>

          </div>
        </div>

        <!-- ── Unit search + list ───────────────────── -->
        <div class="s-section" id="unitSearchSection">
          <label class="s-label" for="unitSearch" data-i18n="section.select">Vybrat jednotku</label>
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <circle cx="6.5" cy="6.5" r="4"/>
              <path d="M10 10l3.5 3.5" stroke-linecap="round"/>
            </svg>
            <input type="text" id="unitSearch" class="search-input"
                   data-i18n-ph="search.placeholder" placeholder="Hledat…"
                   autocomplete="off" spellcheck="false"/>
          </div>
          <select id="unitSelect" multiple size="6" class="unit-list-sel" aria-label="Seznam územních jednotek">
            <option value="" disabled data-i18n="select.loading">Načítám…</option>
          </select>
        </div>

        <!-- ── Custom polygon section ──────────────── -->
        <div class="s-section" id="customSection" style="display:none">
          <div class="draw-hint">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
              <polygon points="10,2 18,6.5 18,13.5 10,18 2,13.5 2,6.5" stroke-dasharray="3 2"/>
            </svg>
            <p data-i18n="custom.hint">Nakreslete polygon nástrojem na mapě, nebo nahrajte GeoJSON soubor.</p>
          </div>
          <label class="file-upload-label" for="geojsonUpload">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M10 3v10M6 7l4-4 4 4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3 15h14" stroke-linecap="round"/>
            </svg>
            <span data-i18n="custom.upload">Nahrát GeoJSON / S-JTSK</span>
            <input type="file" id="geojsonUpload" accept=".geojson,.json"/>
          </label>
        </div>

        <!-- ── Multi-select toggle ─────────────────── -->
        <div class="s-row" id="multiSelectRow">
          <label class="toggle-row">
            <input type="checkbox" id="multiSelectMode" class="visually-hidden"/>
            <span class="track" aria-hidden="true"></span>
            <span class="toggle-label-text" data-i18n="multi.label">Multi-výběr</span>
          </label>
          <span id="selectionCount" class="count-badge" style="display:none">0 vybráno</span>
        </div>

        <div class="s-divider"></div>

        <!-- ── Klimatický ukazatel ──────────────────── -->
        <div class="s-section">
          <div class="s-label" data-i18n="section.indicator">Klimatický ukazatel</div>
          <div class="indicator-grid" id="indicatorGrid">

            <button class="ind-btn active" data-key="demartonne"
                    data-i18n-title="ind.demartonne.title"
                    title="De Martonne index aridity: AI = R / (T + 10)">
              <span class="ind-name" data-i18n="ind.demartonne">De Martonne</span>
              <span class="ind-unit">AI</span>
            </button>

            <button class="ind-btn" data-key="ldf"
                    data-i18n-title="ind.ldf.title"
                    title="Langův dešťový faktor: LDF = R / T">
              <span class="ind-name" data-i18n="ind.ldf">Lang LDF</span>
              <span class="ind-unit">—</span>
            </button>

            <button class="ind-btn" data-key="pet"
                    data-i18n-title="ind.pet.title"
                    title="Potenciální evapotranspirace — Thornthwaite">
              <span class="ind-name" data-i18n="ind.pet">PET</span>
              <span class="ind-unit">mm/r</span>
            </button>

            <button class="ind-btn" data-key="vpd"
                    data-i18n-title="ind.vpd.title"
                    title="Vapor Pressure Deficit">
              <span class="ind-name" data-i18n="ind.vpd">VPD</span>
              <span class="ind-unit">kPa</span>
            </button>

            <button class="ind-btn" data-key="mvj"
                    data-i18n-title="ind.mvj.title"
                    title="Minářova vláhová jistota (veg. období 4–9)">
              <span class="ind-name" data-i18n="ind.mvj">MVJ</span>
              <span class="ind-unit">%</span>
            </button>

            <button class="ind-btn" data-key="kiz"
                    data-i18n-title="ind.kiz.title"
                    title="Končekův index zavlažení (léto 6–8)">
              <span class="ind-name" data-i18n="ind.kiz">KIZ</span>
              <span class="ind-unit">mm</span>
            </button>

            <button class="ind-btn" data-key="deltasra"
                    data-i18n-title="ind.deltasra.title"
                    title="Rozdíl srážek mezi normálami (Δ mm / %)">
              <span class="ind-name" data-i18n="ind.deltasra">Δ Srážky</span>
              <span class="ind-unit">mm</span>
            </button>

            <button class="ind-btn" data-key="deltat"
                    data-i18n-title="ind.deltat.title"
                    title="Rozdíl teplot mezi normálami (Δ °C)">
              <span class="ind-name" data-i18n="ind.deltat">Δ Teplota</span>
              <span class="ind-unit">°C</span>
            </button>

          </div>
        </div>

        <!-- ── Klimatický normál ────────────────────── -->
        <div class="s-section">
          <div class="s-label" data-i18n="section.normal">Klimatický normál</div>
          <div class="normal-segs" id="normalSegs">
            <button class="norm-btn" data-key="old">≤ 1990</button>
            <button class="norm-btn active" data-key="new">1991–2020</button>
            <button class="norm-btn" data-key="future">2050+</button>
          </div>
        </div>

      </div><!-- /sidebar-body -->

      <!-- Footer: status + compute -->
      <div class="sidebar-foot">
        <div class="status-area">
          <div id="statusMessage" class="status-msg" aria-live="polite" aria-atomic="true"></div>
          <div id="stopwatch" class="stopwatch-text"></div>
        </div>
        <button id="computeBtn" class="btn-calc">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M10 3a7 7 0 0 1 7 7"/>
            <path d="M3 10a7 7 0 0 0 7 7"/>
            <path d="M10 3l-2 2 2 2"/>
            <path d="M10 17l2-2-2-2"/>
          </svg>
          <span data-i18n="btn.compute">Vypočítat</span>
        </button>
        <button id="computeAllBtn" class="btn-calc btn-calc--batch" style="display:none">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <rect x="2" y="2" width="7" height="7" rx="1"/>
            <rect x="11" y="2" width="7" height="7" rx="1"/>
            <rect x="2" y="11" width="7" height="7" rx="1"/>
            <path d="M14.5 11v7M11 14.5h7"/>
          </svg>
          <span data-i18n="btn.computeAll">Vypočítat vše</span>
        </button>
      </div>

    </div><!-- /sidebarInner -->
  </aside>

  <!-- Mobile sidebar toggle -->
  <button id="mobileSidebarBtn" class="mobile-sidebar-btn"
          data-i18n-title="mobile.open" aria-label="Otevřít panel" aria-expanded="false" aria-controls="sidebar">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <path d="M3 5h14M3 10h14M3 15h14"/>
    </svg>
  </button>

  <!-- ── RESULTS SHEET ─────────────────────────────────── -->
  <div id="resultsSheet">
    <div class="sheet-bar">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="sheetTitle" data-i18n="sheet.title">Výsledky analýzy</div>
      <div class="sheet-actions">
        <button id="exportGeoBtn" class="btn-export" style="display:none" aria-label="Exportovat jako GeoJSON">
          <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <path d="M10 3v10M6 9l4 4 4-4"/>
            <path d="M3 15h14"/>
          </svg>
          GeoJSON
        </button>
        <button id="closeSheetBtn" class="icon-btn"
                data-i18n-title="close.sheet" title="Zavřít" aria-label="Zavřít výsledky">
          <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M2 2l10 10M12 2L2 12"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="sheet-scroll">
      <div id="resultsSummary">
        <p class="placeholder" data-i18n="sheet.placeholder">Vyberte územní jednotku a spusťte výpočet.</p>
      </div>

      <div class="table-wrap">
        <table id="resultsTable">
          <thead>
            <tr>
              <th data-i18n="table.normal">Normál</th>
              <th>T avg (°C)</th>
              <th>R avg (mm)</th>
              <th data-i18n="table.index">Index</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="chart-area">
        <canvas id="resultsChart"></canvas>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"
        integrity="sha384-J0tVE+pc6+J+SL83ZUKefEICEm8eF0o077ASBJxPiLdjpwxALwH0cb26lrEAIc3P"
        crossorigin="anonymous"></script>
<script src="./js/config.production.js"></script>
<script src="./js/i18n.js"></script>
<script src="./js/api.js"></script>
<script src="./js/compute.js"></script>
<script src="./js/charts.js"></script>
<script src="./js/map.js"></script>
<script src="./js/ui.js"></script>

<script>
  // Init i18n (applies saved lang preference)
  ClimateApp.i18n.init();

  // Lang toggle
  document.getElementById('langToggleBtn').addEventListener('click', () => {
    ClimateApp.i18n.toggle();
  });

  // Mobile sidebar toggle
  const sidebar = document.getElementById('sidebar');
  const mobileSidebarBtn = document.getElementById('mobileSidebarBtn');
  const sidebarClose = document.getElementById('sidebarClose');

  mobileSidebarBtn.addEventListener('click', () => {
    sidebar.classList.add('open');
    mobileSidebarBtn.style.display = 'none';
    mobileSidebarBtn.setAttribute('aria-expanded', 'true');
  });

  sidebarClose.addEventListener('click', () => {
    sidebar.classList.remove('open');
    mobileSidebarBtn.style.display = '';
    mobileSidebarBtn.setAttribute('aria-expanded', 'false');
  });

  function updateSidebarToggleVisibility() {
    if (window.innerWidth >= 768) {
      sidebar.classList.remove('open');
      mobileSidebarBtn.style.display = 'none';
    } else {
      mobileSidebarBtn.style.display = '';
    }
  }
  window.addEventListener('resize', updateSidebarToggleVisibility);
  updateSidebarToggleVisibility();

  // Close results sheet
  document.getElementById('closeSheetBtn').addEventListener('click', () => {
    document.getElementById('resultsSheet').classList.remove('open');
  });

  // Auto-open results sheet when data arrives
  const observer = new MutationObserver(() => {
    const summary = document.getElementById('resultsSummary');
    if (!summary.querySelector('.placeholder')) {
      document.getElementById('resultsSheet').classList.add('open');
    }
  });
  observer.observe(document.getElementById('resultsSummary'), { childList: true, subtree: true });
</script>
</body>
</html>
