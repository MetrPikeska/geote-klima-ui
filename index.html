<!DOCTYPE html>
<!--
  ================================================================
  GEOTE Climate — Webová aplikace pro klimatickou analýzu ČR
  ================================================================

  PŘEDMĚT / COURSE:
    Návrh a realizace uložení dat a dynamického výpočtu vybraných
    klimatických ukazatelů pro prostorově definované územní jednotky
    v prostředí prostorové geodatabáze

  CÍL SEMESTRÁLNÍ PRÁCE:
    Výpočet klimatických ukazatelů (De Martonne index aridiy,
    Potenciální evapotranspirace dle Thornthwaita) pro:
      a) ORP — správní obvody obcí s rozšířenou působností
      b) CHKO — chráněné krajinné oblasti
      c) Libovolný polygon kreslený uživatelem

  KLIMATICKÉ NORMÁLY:
    - Starý normál (≤ 1990)
    - Nový normál (1991–2020)  ← hlavní referenční období
    - Predikce 2050 (≥ 2041)

  KLIMATICKÉ UKAZATELE:
    1. De Martonne index aridiy: AI = R / (T + 10)
       (R = roční srážky [mm], T = průměrná roční teplota [°C])
    2. Potenciální evapotranspirace — Thornthwaitova metoda
       (výpočet z měsíčních průměrných teplot)

  TECHNICKÝ STACK:
    - Frontend: Leaflet.js, Chart.js, Leaflet.draw, Proj4js
    - Backend: Node.js / Express, PostgreSQL / PostGIS
    - Geoprostorová data: pg-featureserv (OGC API Features)
    - Deployment: Wedos hosting (static) + Cloudflare Tunnel
    - Zdrojový kód: https://github.com/MetrPikeska/geote-klima-ui

  AUTOR: Petr Mikeska
  SEMESTR: Zimní semestr
  ================================================================
-->
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>GEOTE Climate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
  <link rel="stylesheet" href="./css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
</head>
<body>
<div id="app">

  <!-- Full-screen map -->
  <div id="map"></div>

  <!-- ── TOP BAR ─────────────────────────────────────── -->
  <header id="topBar">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
              stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="g" x1="2" y1="2" x2="22" y2="22">
          <stop stop-color="#38bdf8"/><stop offset="1" stop-color="#818cf8"/>
        </linearGradient></defs>
      </svg>
      <div class="brand-text">
        <span class="brand-name">GEOTE Climate</span>
        <span class="brand-sub">Czech Republic · Spatial Climate Analysis</span>
      </div>
    </div>
    <div class="top-right">
      <!-- GitHub odkaz na zdrojový kód semestrální práce -->
      <a href="https://github.com/MetrPikeska/geote-klima-ui" target="_blank" rel="noopener"
         class="github-link" title="Zdrojový kód na GitHubu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-label="GitHub">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
      </a>
      <div class="status-pill">
        <span class="status-dot"></span>
        <span>Connected</span>
      </div>
    </div>
  </header>

  <!-- ── MAP TYPE SWITCHER ────────────────────────────── -->
  <div id="mapSwitcher">
    <button class="map-btn active" data-layer="dark">Mapa</button>
    <button class="map-btn" data-layer="osm">OSM</button>
    <button class="map-btn" data-layer="ortofoto">Letecká</button>
    <button class="map-btn" data-layer="katastr">Katastr</button>
  </div>

  <!-- ── CONTROL CARD ──────────────────────────────────── -->
  <div id="controlCard">
    <div class="card-header">
      <span class="card-title">Klimatická analýza</span>
      <button id="collapseBtn" class="icon-btn" title="Sbalit">−</button>
    </div>

    <div id="cardBody">

      <div class="field-group">
        <label class="field-label">Typ jednotky</label>
        <select id="unitTypeSelect" class="sel">
          <option value="orp">ORP — Správní obvod</option>
          <option value="chko" selected>CHKO — Chráněná krajina</option>
          <option value="custom">Vlastní polygon</option>
        </select>
      </div>

      <div id="unitSelectWrapper" class="field-group">
        <label class="field-label">Vybrat jednotku</label>
        <select id="unitSelect" multiple size="6" class="sel unit-list">
          <option value="">Načítám…</option>
        </select>
      </div>

      <p id="customPolygonHint" class="hint" style="display:none">
        Nakreslete polygon pomocí kreslicího nástroje na mapě.
      </p>

      <div id="geojsonUploadWrapper" style="display:none" class="field-group">
        <label class="field-label">Nahrát GeoJSON / S-JTSK</label>
        <input type="file" id="geojsonUpload" accept=".geojson,.json" class="file-input"/>
      </div>

      <div class="row-between">
        <label class="toggle-row">
          <input type="checkbox" id="multiSelectMode"/>
          <span class="track"></span>
          <span class="toggle-label-text">Multi-výběr</span>
        </label>
        <span id="selectionCount" class="badge" style="display:none">0 vybráno</span>
      </div>

      <div class="divider"></div>

      <div class="field-group">
        <label class="field-label">Referenční normál</label>
        <select id="normalSelect" class="sel">
          <option value="old">Starý normál (před 1991)</option>
          <option value="new">Nový normál (1991–2020)</option>
          <option value="future">Predikce 2050</option>
        </select>
      </div>

      <div class="field-group">
        <label class="field-label">Klimatický ukazatel</label>
        <select id="indicatorSelect" class="sel">
          <option value="demartonne">De Martonne index aridiy</option>
          <option value="pet">Potenciální evapotranspirace</option>
        </select>
      </div>

      <button id="computeBtn" class="btn-calc">
        <span class="btn-icon">⟳</span>
        <span>Vypočítat</span>
      </button>
      <button id="computeAllBtn" class="btn-calc" style="display:none">
        <span class="btn-icon">⟳</span>
        <span>Vypočítat vše</span>
      </button>

      <div id="statusMessage" class="status-msg"></div>
      <div id="stopwatch" class="stopwatch-text">Čas výpočtu: 0.00 s</div>

    </div>
  </div>

  <!-- ── RESULTS BOTTOM SHEET ──────────────────────────── -->
  <div id="resultsSheet">
    <div class="sheet-bar">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="sheetTitle">Výsledky</div>
      <div class="sheet-actions">
        <button id="exportGeoBtn" class="btn-export" style="display:none">↓ Export GeoJSON</button>
        <button id="closeSheetBtn" class="icon-btn">✕</button>
      </div>
    </div>

    <div class="sheet-scroll">
      <div id="resultsSummary" class="summary">
        <p class="placeholder">Vyberte jednotku a spusťte výpočet.</p>
      </div>

      <div class="table-wrap">
        <table id="resultsTable">
          <thead>
            <tr><th>Normál</th><th>T °C</th><th>R mm</th><th>Index</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="chart-area">
        <canvas id="resultsChart"></canvas>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
<script src="./js/config.production.js"></script>
<script src="./js/api.js"></script>
<script src="./js/compute.js"></script>
<script src="./js/charts.js"></script>
<script src="./js/map.js"></script>
<script src="./js/ui.js"></script>

<script>
  // Collapse / expand control card
  const card = document.getElementById('controlCard');
  const body = document.getElementById('cardBody');
  const btn  = document.getElementById('collapseBtn');
  btn.addEventListener('click', () => {
    const collapsed = card.classList.toggle('collapsed');
    btn.textContent = collapsed ? '+' : '−';
  });

  // Auto-collapse on mobile
  if (window.innerWidth <= 600) {
    card.classList.add('collapsed');
    btn.textContent = '+';
  }

  // Close results sheet
  document.getElementById('closeSheetBtn').addEventListener('click', () => {
    document.getElementById('resultsSheet').classList.remove('open');
  });

  // Auto-open results sheet when data arrives
  const observer = new MutationObserver(() => {
    const summary = document.getElementById('resultsSummary');
    if (!summary.querySelector('.placeholder')) {
      document.getElementById('resultsSheet').classList.add('open');
    }
  });
  observer.observe(document.getElementById('resultsSummary'), { childList: true, subtree: true });
</script>
</body>
</html>
